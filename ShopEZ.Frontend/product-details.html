<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - ShopEZ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">ShopEZ</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item">
                        <a class="nav-link position-relative" href="cart.html">
                            <i class="bi bi-cart"></i> Cart
                            <span class="cart-badge cart-count">0</span>
                        </a>
                    </li>
                    <li class="nav-item nav-guest">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>
                    <li class="nav-item nav-guest">
                        <a class="nav-link" href="register.html">Register</a>
                    </li>
                    <li class="nav-item dropdown nav-user" style="display: none;">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span class="user-name">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="dashboard.html">My Orders</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="logoutBtn">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Product Details -->
    <div class="container my-5">
        <div class="row">
            <div class="col-md-6">
                <img id="productImage" src="" alt="" class="img-fluid rounded shadow">
            </div>
            <div class="col-md-6">
                <h1 id="productName" class="fw-bold"></h1>
                <p class="text-muted mb-3" id="productCategory"></p>
                <h2 id="productPrice" class="text-primary mb-3"></h2>
                <p id="productDescription" class="lead mb-4"></p>
                <p class="mb-3"><strong id="productStock"></strong></p>
                
                <div class="mt-4">
                    <label class="fw-bold mb-2">Quantity:</label>
                    <div class="d-flex align-items-center gap-2">
                        <button class="btn btn-outline-secondary" id="decreaseQty">
                            <i class="bi bi-dash"></i>
                        </button>
                        <input type="number" id="quantity" value="1" min="1" class="form-control text-center" style="width: 80px;">
                        <button class="btn btn-outline-secondary" id="increaseQty">
                            <i class="bi bi-plus"></i>
                        </button>
                    </div>
                </div>
                
                <div class="mt-4 d-flex gap-3">
                    <button class="btn btn-primary-custom btn-lg flex-grow-1" id="addToCartBtn">
                        <i class="bi bi-cart-plus"></i> Add to Cart
                    </button>
                    <button class="btn btn-success btn-lg flex-grow-1" id="buyNowBtn">
                        Buy Now
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white mt-5 py-4">
        <div class="container text-center">
            <p>&copy; 2024 ShopEZ. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/products.js"></script>
    <script>
        $(document).ready(function() {
            loadProductDetails();
        });
    </script>
</body>
</html>
